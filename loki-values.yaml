deploymentMode: SingleBinary

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

chunksCache:
  allocatedMemory: 500

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki

  limits_config:
    allow_structured_metadata: true
    retention_period: 168h        # 7 days
    volume_enabled: true
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    query_timeout: 300s

  # FINAL FIX (Loki v3.x compatible)
  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: filesystem

  pattern_ingester:
    enabled: true

  ruler:
    enable_api: true
    storage:
      type: local
    wal:
      dir: /var/loki/ruler-wal

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  storage_config:
    filesystem:
      directory: /var/loki/chunks

minio:
  enabled: false

singleBinary:
  replicas: 1

  # NODE PINNING
  nodeSelector:
    kubernetes.io/hostname: zddwmsprowork4

  persistence:
    enabled: false

  extraVolumes:
    - name: storage
      hostPath:
        path: /home/addverb/application-volume/loki-storage/
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: storage
      mountPath: /var/loki

  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "1"
      memory: 2Gi
